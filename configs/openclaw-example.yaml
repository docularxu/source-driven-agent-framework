# OpenClaw Agent Configuration Example
# Source-Driven Code Analysis Multi-Agent Framework
#
# Add these entries to your ~/.openclaw/openclaw.json (JSON5 format).
# Adjust model choices to match your provider/budget.

# ─────────────────────────────────────────────
# 1. Agent Definitions (under "agents.list")
# ─────────────────────────────────────────────
#
# {
#   "agents": {
#     "list": [
#       {
#         "id": "jarvis-arch",
#         "name": "Jarvis-Arch",
#         "workspace": "~/.openclaw/agents/jarvis-arch",
#         "model": {
#           "primary": "anthropic/claude-opus-4-6"
#         },
#         "identity": {
#           "name": "Jarvis-Arch",
#           "emoji": "⚡"
#         },
#         "subagents": {
#           "allowAgents": ["researcher", "reviewer"]
#         },
#         "heartbeat": {
#           "every": "15m",
#           "target": "none"
#         }
#       },
#       {
#         "id": "researcher",
#         "name": "Researcher",
#         "workspace": "~/.openclaw/agents/researcher",
#         "model": {
#           "primary": "anthropic/claude-opus-4-6"
#         },
#         "identity": {
#           "name": "Researcher",
#           "emoji": "🔬"
#         }
#       },
#       {
#         "id": "reviewer",
#         "name": "Reviewer",
#         "workspace": "~/.openclaw/agents/reviewer",
#         "model": {
#           "primary": "anthropic/claude-opus-4-6"
#         },
#         "identity": {
#           "name": "Reviewer",
#           "emoji": "🔍"
#         }
#       }
#     ]
#   }
# }
#
# KEY: "subagents.allowAgents" on Jarvis-Arch lets it spawn
# Researcher and Reviewer as sub-agents. Without this, orchestration
# won't work.

# ─────────────────────────────────────────────
# 2. Agent-to-Agent Communication
# ─────────────────────────────────────────────
#
# The framework uses two communication methods:
#
#   a) sessions_spawn - Jarvis-Arch spawns Researcher/Reviewer with a task
#      Used for: delegating analysis, triggering reviews
#      Requires: "subagents.allowAgents" on Jarvis-Arch
#
#   b) sessions_send  - lightweight message to another agent's session
#      Used for: notifications (e.g. Researcher → Reviewer "analysis complete")
#
# Communication flow (per PROTOCOL.md §6):
#
#   Jarvis-Arch  → Researcher   (spawn: "分析模块 X，看 task.md")
#   Researcher   → Reviewer     (send:  "分析完成，请审查")
#   Reviewer     → Researcher   (send:  "有问题，看 review.md" / "通过 ✅")
#   Reviewer     → Jarvis-Arch  (send:  "review 通过")
#
# All substantive data exchange happens via shared files (blackboard),
# not via message content. Messages are "shoulder taps" only.

# ─────────────────────────────────────────────
# 3. Tool Permissions
# ─────────────────────────────────────────────
#
# By default, OpenClaw agents get standard tool access.
# The framework enforces constraints at two levels:
#
#   - SOUL.md (behavioral): tells the agent what it should/shouldn't do
#   - PROTOCOL.md (protocol): shared workflow rules all agents follow
#   - tools.allow/deny (hard): engine-level enforcement (optional)
#
# Jarvis-Arch (Architect/Orchestrator):
#   NEEDS:  read, write, exec, sessions_spawn, sessions_send
#   WRITES: PROJECT.md, tasks-backlog.md, knowledge-map.md,
#           global-map.md, subsystem-maps/*.md, task.md, SYMBOL_INDEX.md,
#           MEMORY.md (sole writer for all agents' MEMORY.md)
#   EXEC:   ctags/cscope (SYMBOL_INDEX generation)
#   FORBIDDEN (by SOUL.md): deep code analysis (delegate to Researcher)
#
# Researcher (Code Archaeologist):
#   NEEDS:  read, write, exec, sessions_send
#   READS:  source code, task.md, PROJECT.md, knowledge-map.md,
#           SYMBOL_INDEX.md, maps specified in task.md
#   WRITES: analysis/*.md, tasks-backlog.md (status → [Reviewing] only)
#   EXEC:   grep, find, cat, sed -n (read-only code exploration)
#   FORBIDDEN (by SOUL.md): modifying PROJECT.md, knowledge-map.md,
#           SYMBOL_INDEX.md, decisions.md, other agents' files
#
# Reviewer (Logic Judge):
#   NEEDS:  read, write, exec, sessions_send
#   READS:  analysis docs, source code, task.md, PROJECT.md (build config)
#   WRITES: review.md only
#   EXEC:   sed -n, grep, cat -n (MANDATORY for physical code verification)
#   FORBIDDEN (by SOUL.md): modifying analysis docs, knowledge-map.md,
#           passing reports without CLI verification
#
# For hard enforcement, use OpenClaw's per-agent tool config:
#
# {
#   "id": "reviewer",
#   "tools": {
#     "allow": ["read", "exec", "write", "sessions_send"]
#   }
# }
